<!DOCTYPE html>
<html class="h-full" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <title>Khanal Foods Kiosk</title>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Khanal Foods Kiosk" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Kiosk Mode Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Khanal Foods Kiosk" />
    <meta name="msapplication-TileColor" content="#1f2937" />
    <meta name="theme-color" content="#1f2937" />

    <!-- PWA -->
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />

    <!-- Kiosk-specific styles -->
    <style>
      /* Allow normal text selection and interactions (no global lockdown) */
      html, body {
        -webkit-touch-callout: default;
        -webkit-tap-highlight-color: initial;
      }

      /* Hide scrollbars (optional visual tweak) */
      ::-webkit-scrollbar {
        display: none;
      }

      /* Kiosk mode body */
      body {
        overflow: hidden;
        background: #1f2937;
        font-family: 'Inter', system-ui, sans-serif;
      }

      /* Loading screen */
      .kiosk-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1f2937;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .kiosk-loading .logo {
        width: 200px;
        height: 200px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body class="h-full bg-kiosk-primary text-white">
    <!-- Loading Screen -->
    <div id="kiosk-loading" class="kiosk-loading">
      <div class="text-center">
        <div class="logo mb-4">
          <svg class="w-full h-full text-kiosk-accent" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">Khanal Foods</h1>
        <p class="text-gray-300 mt-2">Kiosk Loading...</p>
      </div>
    </div>

    <!-- Main App -->
    <div id="app" class="h-full"></div>
    <script type="module" src="/src/main.js"></script>

    <!-- Kiosk Mode Script -->
    <script>
      // Hide loading screen when app is ready
      window.addEventListener('load', function() {
        setTimeout(() => {
          const loading = document.getElementById('kiosk-loading');
          if (loading) {
            loading.style.display = 'none';
          }
        }, 1000);
      });
      // Optional: Auto-refresh every 30 minutes to keep session fresh
      setTimeout(() => {
        window.location.reload();
      }, 30 * 60 * 1000);
    </script>
  </body>
</html>
