<!DOCTYPE html>
<html class="h-full" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <title>Khanal Foods Kiosk</title>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Khanal Foods Kiosk" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Kiosk Mode Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Khanal Foods Kiosk" />
    <meta name="msapplication-TileColor" content="#1f2937" />
    <meta name="theme-color" content="#1f2937" />

    <!-- PWA -->
    <link
      rel="icon"
      type="image/png"
      sizes="196x196"
      href="/assets/kiosk/manifest/apple-icon-180.png"
    />
    <link
      rel="apple-touch-icon"
      href="/assets/kiosk/manifest/apple-icon-180.png"
    />

    <!-- Kiosk-specific styles -->
    <style>
      /* Prevent text selection and context menu in kiosk mode */
      * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Allow text selection in input fields */
      input, textarea {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }

      /* Hide scrollbars */
      ::-webkit-scrollbar {
        display: none;
      }
      
      /* Prevent zoom on double tap */
      * {
        touch-action: manipulation;
      }

      /* Kiosk mode body */
      body {
        overflow: hidden;
        background: #1f2937;
        font-family: 'Inter', system-ui, sans-serif;
      }

      /* Loading screen */
      .kiosk-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1f2937;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .kiosk-loading .logo {
        width: 200px;
        height: 200px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body class="h-full bg-kiosk-primary text-white">
    <!-- Loading Screen -->
    <div id="kiosk-loading" class="kiosk-loading">
      <div class="text-center">
        <div class="logo mb-4">
          <svg class="w-full h-full text-kiosk-accent" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">Khanal Foods</h1>
        <p class="text-gray-300 mt-2">Kiosk Loading...</p>
      </div>
    </div>

    <!-- Main App -->
    <div id="app" class="h-full"></div>
    <script type="module" src="/src/main.js"></script>

    <!-- Kiosk Mode Script -->
    <script>
      // Hide loading screen when app is ready
      window.addEventListener('load', function() {
        setTimeout(() => {
          const loading = document.getElementById('kiosk-loading');
          if (loading) {
            loading.style.display = 'none';
          }
        }, 1000);
      });

      // Prevent context menu
      document.addEventListener('contextmenu', e => e.preventDefault());
      
      // Prevent F12, Ctrl+Shift+I, etc.
      document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && e.key === 'I') ||
            (e.ctrlKey && e.shiftKey && e.key === 'C') ||
            (e.ctrlKey && e.key === 'U')) {
          e.preventDefault();
        }
      });

      // Auto-refresh every 30 minutes to prevent memory leaks
      setTimeout(() => {
        window.location.reload();
      }, 30 * 60 * 1000);
    </script>
  </body>
</html>
