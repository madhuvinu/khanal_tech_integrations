<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notification Email</title>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #eaeff1;
      margin: 0;
      padding: 40px 0;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 30px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background-color: #ffffff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.8s ease-out;
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: scale(1.01);
    }

    .header {
      font-size: 20px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 20px;
      text-align: center;
    }

    .content p {
      font-size: 16px;
      color: #333;
      margin: 10px 0;
    }

    .content strong {
      color: #000;
    }

    .footer {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
      <table style="margin: 0 auto;">
        <tbody>
          <tr>
            <td align="center" valign="middle" style="margin: 0">
              <a href="" target="_blank">
                <img src="https://khanaltech.com/files/khanalfoods_logo.jpg" width="60" height="60" alt="Khanal Foods Logo">
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="header">📢 Notification from KFL IT</div>
    <div class="content">
      <p>Dear Team,</p>
      <p>Message Regarding <strong>{{ channel_name }} Channel</strong></p>
      <p><strong>PO Number:</strong> {{ po_number or "N/A" }}</p>
      <p><strong>Details:</strong> {{ error_message or "No details provided." }}</p>
      <p><strong>PO URL:</strong> <a href="{{ file_url or "" }}" target="_blank">{{ po_number or "N/A" }}</a></p>
    </div>
    <div class="footer">
      <p>This is an automated message. Please do not reply.</p>
    </div>
  </div>
</body>
</html>
