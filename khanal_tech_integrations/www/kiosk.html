<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Production Kiosk" }}</title>
    <link rel="icon" type="image/png" href="/assets/khanal_tech_integrations/images/favicon.png">
    
    <!-- Vue.js Production Kiosk Assets -->
    <script type="module" crossorigin src="/assets/khanal_tech_integrations/production_kiosk_ui/assets/index-51a86793.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/khanal_tech_integrations/production_kiosk_ui/assets/vendor-51e8e607.js">
    <link rel="stylesheet" href="/assets/khanal_tech_integrations/production_kiosk_ui/assets/index-3cb50700.css">
    
    <style>
        /* Loading styles - will be replaced by Vue app */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loading-container {
            text-align: center;
            color: white;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 18px;
            font-weight: 500;
        }
        
        /* Hide loading when Vue app loads */
        #app:not(:empty) ~ .loading-container {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app"></div>
</body>
</html>
