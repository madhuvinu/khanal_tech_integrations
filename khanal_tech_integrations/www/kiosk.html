<!DOCTYPE html>
<html class="h-full" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover maximum-scale=1.0, user-scalable=no"
    />
    <title>{{ title or "Khanal Foods Kiosk" }}</title>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Khanal Foods Kiosk" />
    <meta name="apple-mobile-web-app-status-bar-style" content="white" />

    <!-- PWA -->
    <link
      rel="icon"
      type="image/png"
      sizes="196x196"
      href="/assets/khanal_tech_integrations/assets/img/favicons/android-chrome-192x192.png"
    />
    <link
      rel="apple-touch-icon"
      href="/assets/khanal_tech_integrations/assets/img/favicons/android-chrome-192x192.png"
    />

    <link rel="manifest" href="/assets/khanal_tech_integrations/kiosk/manifest.webmanifest" />
    
    <!-- Kiosk-specific styles -->
    <style>
      /* Kiosk mode body */
      body {
        background: #1f2937;
        font-family: 'Inter', system-ui, sans-serif;
      }

      /* Loading screen */
      .kiosk-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1f2937;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .kiosk-loading .logo {
        width: 200px;
        height: 200px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      /* Development mode styles */
      .dev-mode * {
        -webkit-user-select: text;
        -moz-user-select: text;
        user-select: text;
        -webkit-touch-callout: default;
        -webkit-tap-highlight-color: auto;
      }

      .dev-mode body {
        overflow: auto;
      }

      .dev-mode ::-webkit-scrollbar {
        display: block;
      }

      /* Production kiosk mode styles */
      .kiosk-mode * {
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      .kiosk-mode input, 
      .kiosk-mode textarea {
        -webkit-user-select: text;
        -moz-user-select: text;
        user-select: text;
      }

      .kiosk-mode ::-webkit-scrollbar {
        display: none;
      }
      
      .kiosk-mode * {
        touch-action: manipulation;
      }

      .kiosk-mode body {
        overflow: hidden;
      }
    </style>
    
        <!-- Load CSS -->
        <link rel="stylesheet" href="/assets/khanal_tech_integrations/kiosk/assets/index-4539a7bb.css">
        
        <!-- Meta tags for PWA -->
        <meta name="theme-color" content="#1f2937" />
        <meta name="description" content="Production Kiosk Tool for Khanal Foods" />
        
        <!-- Prevent zoom on mobile -->
        <meta name="format-detection" content="telephone=no" />
      </head>
      <body class="h-full bg-kiosk-primary text-white">
        <!-- Loading Screen -->
        <div id="kiosk-loading" class="kiosk-loading">
          <div class="text-center">
            <div class="logo mb-4">
              <svg class="w-full h-full text-kiosk-accent" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Khanal Foods</h1>
            <p class="text-gray-300 mt-2">Kiosk Loading...</p>
          </div>
        </div>

        <!-- Main App -->
        <div id="app" class="h-full"></div>
        
        <!-- Load JavaScript -->
        <script type="module" crossorigin src="/assets/khanal_tech_integrations/kiosk/assets/index-38588949.js"></script>
        <link rel="modulepreload" crossorigin href="/assets/khanal_tech_integrations/kiosk/assets/vue-vendor-350dd0f0.js">
        <link rel="modulepreload" crossorigin href="/assets/khanal_tech_integrations/kiosk/assets/axios-vendor-edfcd65b.js">
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/assets/khanal_tech_integrations/kiosk/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
    
    <!-- Kiosk Mode Script -->
    <script>
      // Hide loading screen when app is ready
      window.addEventListener('load', function() {
        setTimeout(() => {
          const loading = document.getElementById('kiosk-loading');
          if (loading) {
            loading.style.display = 'none';
          }
        }, 1000);
      });

      // Get site configuration
      const siteConfig = window.siteConfig || {};
      const isProduction = siteConfig.is_production || false;
      const isDevelopment = siteConfig.developer_mode || false;

      // Apply appropriate mode class to body
      if (isProduction && !isDevelopment) {
        // Production kiosk mode
        document.body.classList.add('kiosk-mode');
        
        // Prevent context menu
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // Prevent F12, Ctrl+Shift+I, etc.
        document.addEventListener('keydown', function(e) {
          if (e.key === 'F12' || 
              (e.ctrlKey && e.shiftKey && e.key === 'I') ||
              (e.ctrlKey && e.shiftKey && e.key === 'C') ||
              (e.ctrlKey && e.key === 'U')) {
            e.preventDefault();
          }
        });

        // Auto-refresh every 30 minutes to prevent memory leaks
        setTimeout(() => {
          window.location.reload();
        }, 30 * 60 * 1000);
      } else {
        // Development mode - allow all interactions
        document.body.classList.add('dev-mode');
        console.log('🔧 Kiosk running in development mode - all interactions enabled');
        
        // Development indicator removed - no longer showing DEV MODE badge
      }
    </script>
    
    <!-- Pass site configuration to frontend -->
    <script>
      window.siteConfig = {{ site_info | tojson }};
    </script>
  </body>
</html>
