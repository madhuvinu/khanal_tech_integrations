    <link href="/assets/khanal_tech_integrations/assets/css/theme.min.css" rel="stylesheet" id="style-default">
    <link href="/assets/khanal_tech_integrations/assets/css/user-rtl.min.css" rel="stylesheet" id="user-style-rtl">
    <link href="/assets/khanal_tech_integrations/assets/css/user.min.css" rel="stylesheet" id="user-style-default">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/bbbootstrap/libraries@main/choices.min.css">

    <script>
        var isRTL = JSON.parse(localStorage.getItem('isRTL'));
        if (isRTL) {
            var linkDefault = document.getElementById('style-default');
            var userLinkDefault = document.getElementById('user-style-default');
            linkDefault.setAttribute('disabled', true);
            userLinkDefault.setAttribute('disabled', true);
            document.querySelector('html').setAttribute('dir', 'rtl');
        } else {
            var linkRTL = document.getElementById('style-rtl');
            var userLinkRTL = document.getElementById('user-style-rtl');
            linkRTL.setAttribute('disabled', true);
            userLinkRTL.setAttribute('disabled', true);
        }
    </script>
    <style>
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-spinner {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.5);
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            box-shadow: 0px 0px 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>


<body>
    <!-- loader -->
    <div class="loader">
        <div class="loader-spinner"></div>
    </div>
    <!-- endloader  -->

    <!-- ===============================================-->
    <!--    Main Content-->
    <!-- ===============================================-->
    <main class="main" id="top">
        {% if frappe.session.user == 'Guest' %}
        <script>
            window.location.href = "/login";
            localStorage.setItem("session_last_route", window.location.pathname)
        </script>
        {% else %}
        <div class="container-fluid" data-layout="container-fluid">
            <script>
                var isFluid = JSON.parse(localStorage.getItem('isFluid'));
                if (isFluid) {
                    var container = document.querySelector('[data-layout]');
                    container.classList.remove('container');
                    container.classList.add('container-fluid');
                }
            </script>
            <!-- sidebar -->
            {% include 'khanal_tech_integrations/www/intranet/partials/sidebar.html' %}
            <!-- end sidebar -->
            <div class="content">
                <!-- header -->
                {% include 'khanal_tech_integrations/www/intranet/partials/header.html' %}
                <!-- endheader -->
                <!-- block content -->
                {% block content %}
                {% endblock content %}
                <!-- end block content -->
                <!-- footer -->
                <!-- {% include 'khanal_tech_integrations/www/intranet/partials/footer.html' %} -->
                <!-- end footer -->
            </div>
        </div>
        {% endif %}

    </main>
    <!-- ===============================================-->
    <!--    End of Main Content-->

    <script src="/assets/khanal_tech_integrations/assets/js/customize.js"></script>
    <script>
        // Function to show the loader
        var isLoading = false;

        function showLoader() {
            var loader = document.querySelector(".loader");
            loader.style.display = "flex";
        }

        function hideLoader() {
            var loader = document.querySelector(".loader");
            loader.style.display = "none";
        }

        function loadData() {
            if (!isLoading) {
                isLoading = true;
                showLoader();

                // Simulate data loading delay of 5 seconds
                setTimeout(function () {
                    // Hide the loader after the data is loaded
                    hideLoader();
                    isLoading = false;
                }, 5000);
            }
        }

        // Show the loader when the page starts loading
        window.addEventListener("beforeunload", showLoader);

        // Hide the loader once the page is fully loaded
        window.addEventListener("load", hideLoader);




    </script>
