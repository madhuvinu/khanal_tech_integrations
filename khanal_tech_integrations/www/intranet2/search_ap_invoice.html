{% block javascripts %}
<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

<script type="text/javascript" src="https://cdn.jsdelivr.net/jquery/latest/jquery.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
<script src="/assets/khanal_tech_integrations/assets/js/myorder.js"></script>
<script>
  function SearchItem() {
    var searched = $('#vendor_code').val()
    $.ajax({
      method: "GET",
      url: "/",
      data: {
        cmd: "khanal_tech_integrations.utils.razorpay.contacts.create_customer_fromSAP",
        VendorCode: searched,


      },
      dataType: "json",
      statusCode: {
        200: function (response) {
          window.location = '/intranet/ap_vendorwise?ap_invoice=' + searched
        },
        400: function (response) {
          swal("Bad Request", {
            icon: "error",
          });


        }
      }


    })
  }

  $('#vendor_code').on('change', function () {
    selected_vendor = $('#vendor_code').val();

    var vendor_name = document.getElementById("vendor_code_list").options.namedItem(selected_vendor).text;
    $('#vendor_name').val(vendor_name);
    //console.log (x);
  })
</script>
{% endblock javascripts %}
