<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
</head>
<body>
    <h1>{{ title }}</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Order Name</th>
                <th>Customer Name</th>
                <th>Order Status</th>
                <th>Total Amount</th>
            </tr>
        </thead>
        <tbody>
            {% for order in b2b_orders %}
            <tr>
                <td>{{ order.name }}</td>
                <td>{{ order.customer_name }}</td>
                <td>{{ order.order_status }}</td>
                <td>{{ order.total_amount }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
