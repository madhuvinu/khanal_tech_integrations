    <script>
        // Function to show the loader
        var isLoading = false;

        function showLoader() {
            var loader = document.querySelector(".loader");
            loader.style.display = "flex";
        }

        function hideLoader() {
            var loader = document.querySelector(".loader");
            loader.style.display = "none";
        }

        function loadData() {
            if (!isLoading) {
                isLoading = true;
                showLoader();

                // Simulate data loading delay of 5 seconds
                setTimeout(function () {
                    // Hide the loader after the data is loaded
                    hideLoader();
                    isLoading = false;
                }, 5000);
            }
        }

        // Show the loader when the page starts loading
        window.addEventListener("beforeunload", showLoader);

        // Hide the loader once the page is fully loaded
        window.addEventListener("load", hideLoader);

        function generateColors(count) { // Function to generate an array of colors
            const colors = [];
            for (let i = 0; i < count; i++) {
                const hue = (i * 137.5) % 360; // distribute hues evenly
                const saturation = 70 + Math.random() * 10; // 70–80% (no dull colors)
                const lightness = 50 + Math.random() * 10; // 50–60% (avoid too dark/light)
                colors.push(`hsl(${hue}, ${saturation}%, ${lightness}%)`);
            }
            return colors;
        }


    </script>

    <script>

        function refreshCooldown(fetchBtnId, displayId, timeSet = 1, isFetchConfirmed = false) {
            const fetchBtn = document.getElementById(fetchBtnId);
            const lastFetchedDisplay = document.getElementById(displayId);

            if (!fetchBtn || !lastFetchedDisplay) return;

            const storageKey = `lastFetchedTime_${fetchBtnId}`;

            // On page load: check if button should still be disabled
            const storedTime = localStorage.getItem(storageKey);
            if (storedTime) {
                updateLastFetchedDisplay(storedTime);
                const elapsed = Date.now() - parseInt(storedTime, 10);
                const waitTime = timeSet * 60 * 1000;
                if (elapsed < waitTime) {
                    disableButton();
                    setTimeout(() => enableButton(), waitTime - elapsed);
                }
            }

             // Triggered if calling manually (like after a successful fetch)
             if (isFetchConfirmed) {
                const now = Date.now();
                localStorage.setItem(storageKey, now);
                updateLastFetchedDisplay(now);
                disableButton();
                setTimeout(() => enableButton(), timeSet * 60 * 1000);
                return;
            }

            function updateLastFetchedDisplay(timestamp) {
                const date = new Date(parseInt(timestamp));
                lastFetchedDisplay.textContent = `Last fetched: ${date.toLocaleString()}`;
            }

            function disableButton() {
                fetchBtn.style.pointerEvents = "none";
                fetchBtn.style.opacity = "0.5";
            }

            function enableButton() {
                fetchBtn.style.pointerEvents = "auto";
                fetchBtn.style.opacity = "1";
            }
        }
    </script>

    <script> // Export to Excel and PDF
        // ✅ Fetch Data - Reusable
        async function fetchData(fetchUrl, mapRowFn) {
            const response = await fetch(fetchUrl, {
                headers: { "Content-Type": "application/json" }
            });

            const data = await response.json();
            const reports = mapRowFn(data);
            return reports;
        }

        function getTableHeaders(tableId) {
            const table = document.getElementById(tableId);
            return Array.from(table.querySelectorAll('thead th')).map(th => th.textContent.trim());
        }

        // ✅ Export to Excel - Reusable
        async function export_data_to_excel({ tableId, fetchUrl, mapRowFn }) {
            try {
                const headers = getTableHeaders(tableId);
                const rows = await fetchData(fetchUrl, mapRowFn);
                const allData = [headers, ...rows];

                const worksheet = XLSX.utils.aoa_to_sheet(allData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "ExportedData");
                XLSX.writeFile(workbook, "ExportedData.xlsx");
            } catch (err) {
                console.error('Excel Export Error:', err);
                alert('Failed to export to Excel.');
            }
        }

        // ✅ Export to PDF - Reusable
        async function export_data_to_pdf({ tableId, fetchUrl, mapRowFn }) {
            try {
                const headers = getTableHeaders(tableId);
                const rows = await fetchData(fetchUrl, mapRowFn);

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.autoTable({ head: [headers], body: rows });
                doc.save("ExportedData.pdf");
            } catch (err) {
                console.error('PDF Export Error:', err);
                alert('Failed to export to PDF.');
            }
        }
    </script>
