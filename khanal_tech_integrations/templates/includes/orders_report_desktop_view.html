        window.loadMilkProcurementReports = function (page, getAll = true) {

            const fetchUrl = `/api/method/khanal_tech_integrations.utils.Dashboard_Reports.orders_report_data.get_context?is_api_call=true`;

            fetch(fetchUrl)

                    // console.log('Full API Response:', data);

                    if (data.message && data.message.orders_report_data_rows) {
                        const reports = data.message.orders_report_data_rows;
                        const tableBody = document.querySelector('#milkProcurementTable tbody');

                            console.log('Fetched Reports:', reports);

                            window.allProcurementData = reports; // Store globally for filtering    
                        

                            // Parse the JSON data from the 'data' field and create an array of parsed objects
                            var parsedData = reports.map(function(item) {
                                return JSON.parse(item.data);
                            });

                            // Get column names dynamically from the first object in the parsed data
                            var columns = Object.keys(parsedData[0]);

                            // Clear existing headings in <thead> and add new ones
                            var headerRow = '';
                            columns.forEach(function(column) {
                                headerRow += '<th>' + column + '</th>';
                            });
                            $('#milkProcurementTable thead tr').empty().html(headerRow);  // Clear existing headers and add new ones

                            // Append rows of data
                            var rows = '';
                            parsedData.forEach(function(item) {
                                rows += '<tr>';
                                columns.forEach(function(column) {
                                    rows += '<td>' + item[column] + '</td>';
                                });
                                rows += '</tr>';
                            });
                            $('#milkProcurementTable tbody').html(rows);

                            if ($.fn.DataTable.isDataTable('#milkProcurementTable')) {
                                $('#milkProcurementTable').DataTable().destroy();
                            }
                            $('#milkProcurementTable thead tr').empty().html(headerRow); // Reset headers
                            $('#milkProcurementTable tbody').html(rows); // Reset rows
                            $('#milkProcurementTable').removeClass('d-none');
