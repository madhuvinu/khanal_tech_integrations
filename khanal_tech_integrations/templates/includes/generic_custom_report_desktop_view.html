<script>


    displayGenericDataTable = function () {
        if (window.allgenericData) {
            const reports = window.allgenericData;
            const tableBody = document.querySelector('#genericTable tbody');
            tableBody.innerHTML = '';

            if (reports.length > 0) {
                // alert('Displaying data in table format');

                console.log('Full API Response:', reports);

                // Parse the JSON data from the 'data' field and create an array of parsed objects
                // var parsedData = reports.map(function (item) {
                //     return JSON.parse(item.sap_data_row);
                // });

                var parsedData = reports;
                // Get column names dynamically from the first object in the parsed data
                var columns = Object.keys(parsedData[0]);
                displayChart(parsedData, "{{ report_display_name }}");
                // Clear existing headings in <thead> and add new ones
                var headerRow = '';
                columns.forEach(function (column) {
                    headerRow += '<th>' + column.replace(/_/g, ' ') + '</th>';
                });
                $('#genericTable thead tr').empty().html(headerRow);  // Clear existing headers and add new ones

                // Append rows of data
                var rows = '';
                parsedData.forEach(function (item) {
                    rows += '<tr>';
                    columns.forEach(function (column) {
                        const value = item[column];
                        const isNumeric = !isNaN(value);
                        const isCurrencyField = /amount|amt|price/i.test(column); // case-insensitive check
                        const isYearField = /year/i.test(column); // case-insensitive check

                        let formattedValue;

                        if (isYearField) {
                            formattedValue = value;
                        } else if (isNumeric && isCurrencyField) {
                            formattedValue = '₹ ' + Number(value).toLocaleString('en-IN');
                        } else if (isNumeric) {
                            formattedValue = Number(value).toLocaleString('en-IN');
                        } else {
                            formattedValue = value;
                        }
                        rows += '<td data-raw="' + value + '">' + formattedValue + '</td>';
                    });
                    rows += '</tr>';
                });
                $('#genericTable tbody').html(rows);

                if ($.fn.DataTable.isDataTable('#genericTable')) {
                    $('#genericTable').DataTable().destroy();
                }
                $('#genericTable thead tr').empty().html(headerRow); // Reset headers
                $('#genericTable tbody').html(rows); // Reset rows
                $('#genericTable').removeClass('d-none');


                $(document).ready(function () {
                    const jdtable = $('#genericTable')
                    // Detect columns dynamically
                    const columnCount = jdtable.find('thead th').length;
                    const columnDefs = [];

                    for (let colIndex = 0; colIndex < columnCount; colIndex++) {
                        // Inspect first non-empty cell in this column to detect if numeric
                        let isNumeric = false;
                        jdtable.find('tbody tr').each(function () {
                            const cell = $(this).find('td').eq(colIndex);
                            const raw = cell.data('raw');
                            if (raw !== undefined) {
                                // Check if raw value is a number (integer or float)
                                if (!isNaN(raw)) {
                                    isNumeric = true;
                                }
                                return false; // break loop after first data-raw found
                            }
                        });

                        if (isNumeric) {
                            // For numeric columns with data-raw, add render function
                            columnDefs.push({
                                targets: [colIndex],
                                render: function (data, type, row, meta) {
                                    var td = meta.settings.aoData[meta.row].anCells[meta.col];
                                    var raw = $(td).data('raw');

                                    if (type === 'sort' || type === 'type') {
                                        return raw !== undefined ? raw : data;
                                    }

                                    if (type === 'filter') {
                                        if (raw !== undefined && raw !== null) {
                                            return raw.toString();
                                        } else if (data !== undefined && data !== null) {
                                            return data.toString();
                                        } else {
                                            return '';
                                        }
                                    }

                                    return data;
                                }
                            });
                        }
                    }

                    // Initialize DataTable with dynamic columnDefs
                    jdtable.DataTable({
                        columnDefs: columnDefs
                    });
                    $('#genericTable').removeClass('d-none');

                    // Update bar chart on search, page, or order change
                    // jdtable.on('search.dt page.dt order.dt', function () {
                    //     // Get only the displayed (filtered) data
                    //     const displayedData = jdtable.rows({ search: 'applied' }).data().toArray();
                    //     // Map displayedData back to report objects
                    //     const filteredReports = displayedData.map(row => {
                    //         const rowData = {};
                    //         $('#genericTable thead th').each(function (index) {
                    //             const columnName = $(this).text().replace(/ /g, '_'); // Match header text to keys
                    //             rowData[columnName] = row[index];
                    //         });
                    //         return { sap_data_row: JSON.stringify(rowData) };
                    //     });
                    //       //showBarChart(filteredReports);
                    // });

                    // Initial chart with all data
                    // showBarChart(reports);
                });

            } else {
                tableBody.innerHTML = '<tr><td colspan="10">No data available</td></tr>';
            }
        }
    };




    document.getElementById("genericfetchButton").addEventListener("click", function () {
        fetchLatestDataFromSAP("{{ report_name }}");
    });





</script>
